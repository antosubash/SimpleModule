name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    outputs:
      version: ${{ steps.bump.outputs.version }}
      skip: ${{ steps.check.outputs.skip }}
      sha: ${{ steps.push.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if release commit
        id: check
        run: |
          # For workflow_run, check the commit that triggered CI (not current HEAD)
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
          else
            SHA="HEAD"
          fi
          MSG=$(git log -1 --pretty=%s "$SHA")
          if [[ "$MSG" == release:* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: commit $SHA is a release commit"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine bump type
        if: steps.check.outputs.skip != 'true'
        id: bump-type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "bump=${{ inputs.bump }}" >> "$GITHUB_OUTPUT"
          else
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        if: steps.check.outputs.skip != 'true'
        id: bump
        run: |
          CURRENT=$(jq -r .version version.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          BUMP="${{ steps.bump-type.outputs.bump }}"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          jq -n --arg v "$NEW_VERSION" '{"version": $v}' > version.json
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT -> $NEW_VERSION ($BUMP)"

      - name: Commit and tag
        if: steps.check.outputs.skip != 'true'
        id: push
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "release: v${VERSION}"
          git tag "v${VERSION}"
          git push origin main --follow-tags
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  publish-nuget:
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.skip != 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.version.outputs.sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Download Tailwind CSS
        run: bash tools/download-tailwind.sh

      - name: Restore
        run: dotnet restore

      - name: Pack
        run: dotnet pack -c Release -p:Version=${{ needs.version.outputs.version }} --no-restore -o ./nupkgs

      - name: Push to NuGet
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

  publish-npm:
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.skip != 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.version.outputs.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Set version and publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          for pkg in packages/SimpleModule.Client packages/SimpleModule.UI packages/SimpleModule.Theme.Default; do
            (cd "$pkg" && npm version "$VERSION" --no-git-tag-version && npm publish --access public)
          done

  github-release:
    runs-on: ubuntu-latest
    needs: [version, publish-nuget, publish-npm]
    if: needs.version.outputs.skip != 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.version.outputs.sha }}
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            --verify-tag
