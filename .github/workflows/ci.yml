name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Lint and format check
        run: npx biome check .

      - name: Validate pages registry
        run: npm run validate-pages

      - name: Validate i18n keys
        run: npm run validate:i18n

      - name: Validate framework scope
        run: node scripts/validate-framework-scope.mjs

      - name: TypeScript type check
        run: npm run typecheck

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-build

      - name: Test
        run: dotnet test --no-build

  e2e:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-build

      - name: Install Playwright browsers
        run: npx -w tests/e2e playwright install --with-deps

      - name: Run smoke tests
        run: npm run test:smoke -w tests/e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 14

  docker:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: simplemodule:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
