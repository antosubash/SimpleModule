name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6

      - name: Check for code changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin ${{ github.base_ref }} --depth=1
            CHANGES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -v '^\.github/' || true)
          else
            CHANGES=$(git diff --name-only HEAD~1 | grep -v '^\.github/' || true)
          fi
          if [ -z "$CHANGES" ]; then
            echo "code=false" >> "$GITHUB_OUTPUT"
            echo "No code changes detected — CI jobs will skip expensive steps"
          else
            echo "code=true" >> "$GITHUB_OUTPUT"
          fi

  lint:
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        if: needs.changes.outputs.code == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        if: needs.changes.outputs.code == 'true'
        run: npm ci

      - name: Lint and format check
        if: needs.changes.outputs.code == 'true'
        run: npm run check

      - name: Skip
        if: needs.changes.outputs.code != 'true'
        run: echo "No code changes — skipping lint"

  build:
    runs-on: ubuntu-latest
    needs: [changes, lint]
    steps:
      - uses: actions/checkout@v6
        if: needs.changes.outputs.code == 'true'

      - uses: ./.github/actions/setup-build
        if: needs.changes.outputs.code == 'true'

      - name: Test
        if: needs.changes.outputs.code == 'true'
        run: dotnet test --no-build

      - name: Skip
        if: needs.changes.outputs.code != 'true'
        run: echo "No code changes — skipping build"

  e2e:
    runs-on: ubuntu-latest
    needs: [changes, lint]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        if: needs.changes.outputs.code == 'true'

      - uses: ./.github/actions/setup-build
        if: needs.changes.outputs.code == 'true'

      - name: Install Playwright browsers
        if: needs.changes.outputs.code == 'true'
        run: npx -w tests/e2e playwright install --with-deps

      - name: Run smoke tests
        if: needs.changes.outputs.code == 'true'
        run: npm run test:smoke -w tests/e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() && needs.changes.outputs.code == 'true' }}
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 14

      - name: Skip
        if: needs.changes.outputs.code != 'true'
        run: echo "No code changes — skipping e2e"
